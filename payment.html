<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
    <link rel="stylesheet" href="payment.css">
</head>
<body>

    <div class="payment-container">
        <h2>Payment Form</h2>

        <form class="payment-form">
            <label for="creditCard">Card Number</label>
            <input type="text" id="creditCard" placeholder="1234 5678 9012 3456">

            <div class="row">
                <div class="col">
                    <label for="expiration">Expiry Month</label>
                    <select id="expiration">
                        <option>January</option>
                        <option>February</option>
                        <option>March</option>
                        <option>April</option>
                        <option>May</option>
                        <option>June</option>
                        <option>July</option>
                        <option>August</option>
                        <option>September</option>
                        <option>October</option>
                        <option>November</option>
                        <option>December</option>
                    </select>
                </div>

                <div class="col">
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" placeholder="123">
                </div>
            </div>

            <label for="pin">Card PIN</label>
            <input type="password" id="pin" placeholder="****" maxlength="4">

            <button type="submit" class="pay-btn">Pay Now</button>
        </form>

        <button class="cancel-btn">Cancel Payment</button>

        <div class="qr-section">
            <h3>Scan QR Code</h3>
            <img src="frame.png" alt="QR Code">
            <p>Use any UPI app to scan & pay</p>
        </div>
    </div>

    <div class="bottom-links">
        <a href="index.html">Home</a>
    </div>

    <footer>
        © 2026 Southern Tourism | Trusted by Thousands
    </footer>

</body>
</html>
